<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#F3EADF"/>
  <rect x="24" y="24" width="1152" height="712" stroke="#D8CBBE" stroke-width="1.5"/>
  <rect x="36" y="36" width="1128" height="688" stroke="#E9D8C0"/>

  <text x="70" y="90" fill="#2D1D16" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-style="italic">
    Worldwide Hotel Market Segmentation by Tier
  </text>
  <text x="70" y="123" fill="#6F584B" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="15">
    Stacked columns by star-equivalent tier. Europe is source-anchored plus estimated mix; rest of world uses an improved non-European sample.
  </text>

  <rect x="70" y="150" width="1060" height="40" fill="#E9D8C0" stroke="#D8CBBE"/>
  <text x="90" y="175" fill="#6F2430" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="14" font-weight="700">
    WATERFALL VIEW
  </text>
  <text x="255" y="175" fill="#6F584B" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="14">
    Hospitality market worldwide = World without Europe + Europe
  </text>

  <g stroke="#D8CBBE" stroke-width="1">
    <line x1="150" y1="626" x2="1060" y2="626"/>
    <line x1="150" y1="521" x2="1060" y2="521"/>
    <line x1="150" y1="416" x2="1060" y2="416"/>
    <line x1="150" y1="311" x2="1060" y2="311"/>
    <line x1="150" y1="206" x2="1060" y2="206"/>
  </g>

  <g fill="#6F584B" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="13">
    <text x="92" y="631">0</text>
    <text x="72" y="526">100k</text>
    <text x="72" y="421">200k</text>
    <text x="72" y="316">300k</text>
    <text x="72" y="211">400k</text>
  </g>

  <g>
    <line x1="150" y1="626" x2="150" y2="170" stroke="#6F584B" stroke-width="1.5"/>
  </g>

  <!-- Worldwide -->
  <g>
    <rect x="220" y="494" width="150" height="132" fill="#31463A"/>
    <rect x="220" y="314" width="150" height="180" fill="#B08A3E"/>
    <rect x="220" y="231" width="150" height="83" fill="#6F2430"/>
    <rect x="220" y="214" width="150" height="17" fill="#5E6F7B"/>
    <rect x="220" y="207" width="150" height="419" stroke="#2D1D16" stroke-width="1.25"/>
    <text x="295" y="662" text-anchor="middle" fill="#2D1D16" font-family="Georgia, 'Times New Roman', serif" font-size="24">Worldwide</text>
    <text x="295" y="688" text-anchor="middle" fill="#6F584B" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="14">386,144 hotels (hybrid model)</text>
  </g>

  <!-- Rest of World -->
  <g>
    <rect x="525" y="548" width="150" height="78" fill="#31463A"/>
    <rect x="525" y="471" width="150" height="77" fill="#B08A3E"/>
    <rect x="525" y="437" width="150" height="34" fill="#6F2430"/>
    <rect x="525" y="425" width="150" height="12" fill="#5E6F7B"/>
    <rect x="525" y="424" width="150" height="202" stroke="#2D1D16" stroke-width="1.25"/>
    <text x="600" y="662" text-anchor="middle" fill="#2D1D16" font-family="Georgia, 'Times New Roman', serif" font-size="24">World Without Europe</text>
    <text x="600" y="688" text-anchor="middle" fill="#6F584B" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="14">193,072 hotels (improved estimate)</text>
  </g>

  <!-- Europe -->
  <g>
    <rect x="830" y="574" width="150" height="52" fill="#31463A"/>
    <rect x="830" y="475" width="150" height="99" fill="#B08A3E"/>
    <rect x="830" y="429" width="150" height="46" fill="#6F2430"/>
    <rect x="830" y="423" width="150" height="6" fill="#5E6F7B"/>
    <rect x="830" y="423" width="150" height="203" stroke="#2D1D16" stroke-width="1.25"/>
    <text x="905" y="662" text-anchor="middle" fill="#2D1D16" font-family="Georgia, 'Times New Roman', serif" font-size="24">Europe</text>
    <text x="905" y="688" text-anchor="middle" fill="#6F584B" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="14">193,072 hotels (DELTA CHECK anchored)</text>
  </g>

  <!-- Waterfall connectors -->
  <g stroke="#6F584B" stroke-width="2.2" stroke-dasharray="7 7" fill="none" opacity="0.9">
    <path d="M295 194 C380 150, 500 150, 600 411"/>
    <path d="M295 194 C500 145, 760 145, 905 410"/>
  </g>
  <g fill="#6F584B" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="22" font-weight="700">
    <text x="446" y="255">=</text>
    <text x="748" y="255">+</text>
  </g>

  <!-- Legend -->
  <g>
    <text x="1040" y="246" fill="#6F2430" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="14" font-weight="700">LEGEND</text>

    <rect x="1038" y="268" width="18" height="18" fill="#5E6F7B"/>
    <text x="1068" y="282" fill="#2D1D16" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="13">Luxury (5-star+)</text>

    <rect x="1038" y="298" width="18" height="18" fill="#6F2430"/>
    <text x="1068" y="312" fill="#2D1D16" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="13">Premium (4-star)</text>

    <rect x="1038" y="328" width="18" height="18" fill="#B08A3E"/>
    <text x="1068" y="342" fill="#2D1D16" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="13">Standard (3-star)</text>

    <rect x="1038" y="358" width="18" height="18" fill="#31463A"/>
    <text x="1068" y="372" fill="#2D1D16" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="13">Other (1-star + 2-star)</text>
  </g>

  <!-- Segment labels -->
  <g fill="#FCF6EE" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="12" font-weight="700">
    <text x="295" y="225" text-anchor="middle">16,978</text>
    <text x="295" y="274" text-anchor="middle">76,886</text>
    <text x="295" y="418" text-anchor="middle">167,535</text>
    <text x="295" y="568" text-anchor="middle">124,745</text>

    <text x="600" y="434" text-anchor="middle">11,430</text>
    <text x="600" y="459" text-anchor="middle">32,927</text>
    <text x="600" y="515" text-anchor="middle">73,171</text>
    <text x="600" y="590" text-anchor="middle">75,544</text>

    <text x="905" y="435" text-anchor="middle">5,548</text>
    <text x="905" y="460" text-anchor="middle">43,959</text>
    <text x="905" y="530" text-anchor="middle">94,364</text>
    <text x="905" y="603" text-anchor="middle">49,201</text>
  </g>

  <text x="70" y="720" fill="#6F584B" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="12">
    Source logic: Europe total is anchored to DELTA CHECK's Europe share; Europe mix is estimated and world-without-Europe uses a weighted non-European sample.
  </text>
</svg>
